name: dgha
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.0.0
  geolocator: ^13.0.4
  http: ^1.2.2
  shared_preferences: ^2.3.4
  oauth2: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/menu_card/
    - assets/languages/guide_dog_access/
    - assets/languages/guide_dog_info/
    - assets/languages/laws/act/
    - assets/languages/laws/federal/
    - assets/languages/laws/nsw/
    - assets/languages/laws/nt/
    - assets/languages/laws/qld/
    - assets/languages/laws/sa/
    - assets/languages/laws/tas/
    - assets/languages/laws/vic/
    - assets/languages/laws/wa/
    - assets/images/dgha_logo/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins/Poppins-Black.ttf
          weight: 900